<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kozy_デザイン構築 | クリエイティブポートフォリオ</title>
    <meta name="description" content="デザイン・動画・情報設計を横断し、「理解 → 興味 → 行動」まで導くクリエイティブを設計します。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: {
                            900: '#0a0e1a',
                            800: '#0d1b3e',
                            700: '#1a2847',
                        },
                        gold: {
                            500: '#EA580C',
                            400: '#F97316',
                            300: '#FDBA74',
                        }
                    },
                    fontFamily: {
                        'display': ['"Cormorant Garamond"', 'serif'],
                        'sans': ['"Meiryo"', '"Noto Sans JP"', 'sans-serif'],
                    },
                    animation: {
                        'pan': 'pan 20s ease-in-out infinite alternate',
                        'float': 'float 6s ease-in-out infinite',
                        'bounce-slow': 'bounce 3s infinite',
                        'fadeIn': 'fadeIn 0.6s ease-out forwards',
                        'slideUp': 'slideUp 0.8s ease-out forwards',
                        'slideInLeft': 'slideInLeft 0.8s ease-out forwards',
                        'slideInRight': 'slideInRight 0.8s ease-out forwards',
                        'scaleIn': 'scaleIn 0.6s ease-out forwards',
                        'textReveal': 'textReveal 0.8s ease-out forwards',
                        'countUp': 'countUp 2s ease-out forwards',
                    },
                    keyframes: {
                        pan: {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideInLeft: {
                            '0%': { opacity: '0', transform: 'translateX(-40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(40px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        },
                        textReveal: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            overflow-x: hidden;
            font-family: "Meiryo", "Noto Sans JP", sans-serif;
        }
        
        /* 日本語のみ Meiryo 強制 */
        .japanese {
             font-family: "Meiryo", "Noto Sans JP", sans-serif;
        }
        
        /* Scroll Progress Bar */
        #progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #c9a84c, #f0c040);
            z-index: 9997;
            transition: width 0.1s ease;
        }
        
        /* Noise Texture */
        .noise-texture {
            position: relative;
            overflow: hidden;
        }
        
        .noise-texture::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(26, 40, 71, 0.7);
            backdrop-filter: blur(10px);
           border-color: rgba(255, 255, 255, 0.1);
        }
        
        /* Particle Background */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .particle {
            position: absolute;
            background: #f0c040;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        /* -------------------------------------
           修正箇所：文字アニメーションのキーフレーム追加
        -------------------------------------- */
        @keyframes textReveal {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Text Split Animation */
        .text-split span {
            display: inline-block;
            opacity: 0;
            animation: textReveal 0.6s ease-out forwards;
        }
        
        /* Magnetic Button */
        .magnetic-btn {
            transition: transform 0.2s cubic-bezier(0.23, 1, 0.320, 1);
        }
        
        /* Fade Reveal */
        .fade-reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        
        .fade-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Hero Background Animation - 表紙画像に変更 */
        .hero-bg {
            background: linear-gradient(rgba(10, 14, 26, 0.60), rgba(10, 14, 26, 0.60)),
            url('DESIGN表紙.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* Image Zoom on Hover */
        .image-zoom {
            overflow: hidden;
        }
        
        .image-zoom img {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.320, 1);
        }
        
        .image-zoom:hover img {
            transform: scale(1.1);
        }
        
        /* Mobile Menu */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }
        
        .mobile-menu.open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="bg-navy-900 text-white font-sans">
    
    <div id="progress-bar" style="width: 0%"></div>
    
    <div id="root"></div>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // ============ LOADING SCREEN ============
       function LoadingScreen() {
            return null;
        }
        
        // ============ SCROLL PROGRESS ============
        function ScrollProgress() {
            useEffect(() => {
                const updateProgress = () => {
                    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
                    const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    const progress = (scrollTop / scrollHeight) * 100;
                    document.getElementById('progress-bar').style.width = progress + '%';
                };
                
                window.addEventListener('scroll', updateProgress);
                return () => window.removeEventListener('scroll', updateProgress);
            }, []);
            
            return null;
        }
        
        // ============ NAVIGATION ============
        function Navigation({ currentPage }) {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const scrollToSection = (sectionId) => {
                if (currentPage === 'home') {
                    const element = document.getElementById(sectionId);
                    if (element) {
                        element.scrollIntoView({ behavior: 'smooth' });
                        setIsMobileMenuOpen(false);
                    }
                } else {
                    window.location.hash = '#/';
                    setTimeout(() => {
                        const element = document.getElementById(sectionId);
                        if (element) {
                            element.scrollIntoView({ behavior: 'smooth' });
                        }
                    }, 100);
                }
            };
            
            return (
                <>
                    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${isScrolled ? 'glass' : 'bg-transparent'}`}>
                        <div className="container mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <a href="#/" className="text-2xl font-display text-gold-300 hover:text-gold-400 transition-colors">
                                    kozy_<span className="japanese">デザイン構築</span>
                                </a>
                                
                                {/* Desktop Menu */}
                                <div className="hidden md:flex items-center space-x-8">
                                    <button onClick={() => scrollToSection('about')} className="text-sm hover:text-gold-300 transition-colors">About</button>
                                    <button onClick={() => scrollToSection('showcase')} className="text-sm hover:text-gold-300 transition-colors">Showcase</button>
                                    <button onClick={() => scrollToSection('contact')} className="text-sm hover:text-gold-300 transition-colors">Contact</button>
                                </div>
                                
                                {/* Mobile Hamburger */}
                                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden">
                                    <div className="space-y-1.5">
                                        <span className="block w-6 h-0.5 bg-gold-300"></span>
                                        <span className="block w-6 h-0.5 bg-gold-300"></span>
                                        <span className="block w-6 h-0.5 bg-gold-300"></span>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </nav>
                    
                    {/* Mobile Menu */}
                    <div className={`mobile-menu fixed top-0 right-0 bottom-0 w-64 bg-navy-800 z-50 md:hidden ${isMobileMenuOpen ? 'open' : ''}`}>
                        <div className="p-6">
                            <button onClick={() => setIsMobileMenuOpen(false)} className="text-gold-300 text-2xl mb-8">×</button>
                            <div className="flex flex-col space-y-6">
                                <button onClick={() => scrollToSection('about')} className="text-left text-lg hover:text-gold-300 transition-colors">About</button>
                                <button onClick={() => scrollToSection('showcase')} className="text-left text-lg hover:text-gold-300 transition-colors">Showcase</button>
                                <button onClick={() => scrollToSection('contact')} className="text-left text-lg hover:text-gold-300 transition-colors">Contact</button>
                            </div>
                        </div>
                    </div>
                    
                    {isMobileMenuOpen && (
                        <div onClick={() => setIsMobileMenuOpen(false)} className="fixed inset-0 bg-black/50 z-40 md:hidden"></div>
                    )}
                </>
            );
        }
        
        // ============ INTERSECTION OBSERVER HOOK ============
        function useInView(ref, options = {}) {
            const [isVisible, setIsVisible] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                    }
                }, { threshold: 0.1, ...options });
                
                const currentRef = ref.current;
                if (currentRef) {
                    observer.observe(currentRef);
                }
                
                return () => {
                    if (currentRef) {
                        observer.unobserve(currentRef);
                    }
                };
            }, [ref, options]);
            
            return isVisible;
        }
        
        // ============ HERO SECTION ============
        function HeroSection() {
            const [textVisible, setTextVisible] = useState(false);
            
            useEffect(() => {
                setTimeout(() => setTextVisible(true), 100);
            }, []);
            
            const splitText = (text, offset = 0) => {
                return text.split('').map((char, i) => (
                    <span key={i} style={{ animationDelay: `${(i + offset) * 0.05}s` }}>
                        {char === ' ' ? '\u00A0' : char}
                    </span>
                ));
            };
            
            return (
                <section className="relative min-h-screen flex items-center justify-center overflow-hidden hero-bg noise-texture">
                    {/* Particles */}
                    <div className="particles">
                        {[...Array(20)].map((_, i) => (
                            <div
                                key={i}
                                className="particle"
                                style={{
                                    width: `${Math.random() * 4 + 2}px`,
                                    height: `${Math.random() * 4 + 2}px`,
                                    left: `${Math.random() * 100}%`,
                                    top: `${Math.random() * 100}%`,
                                    animationDelay: `${Math.random() * 6}s`,
                                    animationDuration: `${Math.random() * 4 + 4}s`,
                                }}
                            />
                        ))}
                    </div>
                    
                    {/* Overlay */}
                    <div className="absolute inset-0 bg-black/50 backdrop-blur-[2px]"></div>
                    
                    {/* Content */}
<div className="relative z-10 text-center px-6 max-w-4xl w-full mx-auto">
    {/* ▼ inline-block と text-left を追加して左揃えにしつつ中央に配置 ▼ */}
    <h1 className={`inline-block text-left text-6xl md:text-8xl lg:text-9xl font-display text-white mb-6 leading-tight text-split ${textVisible ? '' : 'opacity-0'}`}>
        {textVisible && splitText('Visuals,', 0)}
        <br />
        {textVisible && splitText('Logic, And', 8)}
        <br />
        {textVisible && <span className="font-bold text-orange-500">{splitText('Design.', 19)}</span>}
    </h1>
</div>				</section>
            );
        }
        
        // ============ ABOUT SECTION ============
        function AboutSection() {
            const sectionRef = useRef(null);
            const isVisible = useInView(sectionRef);
            
            const skills = [
                '広告バナー',
                'WEB制作',
                'インスタ投稿',
                'サムネイル',
                '電子書籍',
                'スライド作成'
            ];
            
            return (
                <section id="about" ref={sectionRef} className="py-20 md:py-32 bg-navy-900 noise-texture">
                    <div className="container mx-auto px-6">
                        <div className="grid md:grid-cols-2 gap-12 items-center">
                            {/* Image */}
                            <div className={`fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.1s' }}>
                                <div className="relative">
                                    <div className="aspect-[4/5] rounded-lg overflow-hidden image-zoom">
                                        <img 
                                            src="about.png" 
                                            alt="kozy_ profile"
                                            className="w-full h-full object-cover"
                                        />
                                    </div>
                                    <div className="absolute -bottom-6 -right-6 w-32 h-32 border-2 border-gold-300 rounded-lg -z-10"></div>
                                </div>
                            </div>
                            
                            {/* Content */}
                            <div>
                                <h2 className={`text-4xl md:text-5xl font-display text-gold-300 mb-6 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.2s' }}>
                                    About
                                </h2>
                                
                                {/* メインキャッチコピー */}
                                <h3 className={`text-2xl md:text-3xl font-bold leading-relaxed mb-8 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.3s' }}>
                                    あなたの「伝えたい」を、<br className="hidden md:block" />
                                    最も<span className="text-gold-300">「伝わる」</span>形へ。
                                </h3>
                                
                                {/* 悩み・共感セクション（少し背景と線を敷いて引用風に） */}
                                <div className={`border-l-4 border-gold-300/50 pl-5 py-3 mb-8 bg-navy-800/30 rounded-r-lg fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.4s' }}>
                                    <p className="text-gray-300 leading-relaxed mb-3 text-sm md:text-base">
                                        「発信したいけれど、デザインが苦手…」<br />
                                        「本業が忙しくて、クリエイティブを作る時間がない…」
                                    </p>
                                    <p className="text-gold-300 font-semibold text-sm md:text-base">
                                        そんなお悩みを、デザインの力でクリアにします。
                                    </p>
                                </div>
                                
                                {/* 理念・アプローチ */}
                                <div className={`space-y-6 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.5s' }}>
                                    <p className="text-gray-300 leading-relaxed text-sm md:text-base">
                                        私が大切にしているのは、表面的な美しさだけではありません。<br />
                                        <strong className="text-white font-semibold tracking-wide">「誰に、何を伝え、どう動いてほしいのか？」</strong><br />
                                        その目的から逆算し、デザイン・動画・情報設計を横断した<strong className="text-gold-300 font-semibold tracking-wide">「理解 → 興味 → 行動」</strong>の導線を構築します。
                                    </p>
                                    
                                    <p className="text-gray-300 leading-relaxed text-sm md:text-base">
                                        機動力とクオリティを両立する<strong className="text-white font-semibold">Canva</strong>をメインツールに据え、骨組みとなる<span className="text-gold-300">「構成」</span>、言葉を磨く<span className="text-gold-300">「言語化」</span>、そして目を惹く<span className="text-gold-300">「デザイン」</span>までをトータルサポート。<br />
                                        <br />
                                        あなたの右腕として、想いを届けるお手伝いをします。
                                    </p>
                                </div>
                                
                                {/* スキル */}
                                <div className={`mt-10 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.6s' }}>
                                    <h4 className="text-gold-300 font-semibold mb-4 flex items-center">
                                        <span className="w-12 h-px bg-gold-300 mr-3"></span>
                                        スキル
                                    </h4>
                                    
                                    <div className="flex flex-wrap gap-3">
                                        {skills.map((skill, i) => (
                                            <span 
                                                key={i} 
                                                className="px-4 py-2 border border-gold-300/30 rounded-full text-sm hover:border-gold-300 hover:bg-gold-300/10 transition-all"
                                            >
                                                {skill}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

                    id: 'insta',

                },
                {
                    id: 'thumbnail',
                    title: 'サムネイル',

                },
                {
                    id: 'ebook',

                            </h2>
                            <div className={`w-20 h-1 bg-gold-300 mx-auto fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.1s' }}></div>

        // ============ CONTACT SECTION ============
        function ContactSection() {
            const [status, setStatus] = React.useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                const form = e.target;
                setStatus('submitting');

                // 送信するデータをまとめる
                const templateParams = {
                    name: form.name.value,
                    email: form.email.value,
                    message: form.message.value
                };

                const data = {
                    service_id: 'service_s0ovqzg',      // ★変更：ステップ1でメモしたService ID
                    template_id: 'template_2ktbnwc',    // ★変更：ステップ2でメモしたTemplate ID
                    user_id: 'sC0FARWSlC5RF9Toi',         // ★変更：ステップ3でメモしたPublic Key
                    template_params: templateParams
                };

                try {
                    // EmailJSのAPIへデータを送信
                    const response = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        setStatus('success');
                        form.reset(); // 入力内容をクリア
                    } else {
                        const errorData = await response.text();
                        console.error('EmailJS Error:', errorData);
                        setStatus('error');
                    }
                } catch (error) {
                    console.error('Fetch Error:', error);
                    setStatus('error');
                }
            };

            return (
                <section id="contact" className="py-20 md:py-32 bg-navy-900 noise-texture">
                  <div className="container mx-auto px-6">
                    <div className="max-w-2xl mx-auto">

                      <div className="text-center mb-16">
                        <h2 className="text-4xl md:text-5xl font-display text-gold-300 mb-4">
                          Contact
                        </h2>
                        <div className="w-20 h-1 bg-gold-300 mx-auto"></div>
                      </div>

                      <form 
                        onSubmit={handleSubmit}
                        className="glass rounded-lg p-8"
                      >
                        
                        {/* 送信成功時のメッセージ */}
                        {status === 'success' && (
                            <div className="mb-6 p-4 bg-green-500/20 border border-green-500 text-green-300 rounded-lg text-center font-bold">
                                メッセージをお送りいただき、ありがとうございました。<br/>
                                追ってご連絡させていただきます。（自動返信メールをお送りしました）
                            </div>
                        )}
                        
                        {/* エラー時のメッセージ */}
                        {status === 'error' && (
                            <div className="mb-6 p-4 bg-red-500/20 border border-red-500 text-red-300 rounded-lg text-center font-bold">
                                送信に失敗しました。時間をおいて再度お試しください。
                            </div>
                        )}

                        <div className="mb-6">
                          <label htmlFor="name" className="block text-sm font-semibold mb-2 text-gold-300">お名前</label>
                          <input type="text" name="name" required
                            className="w-full px-4 py-3 bg-navy-800 border border-gray-700 rounded-lg text-white" />
                        </div>

                        <div className="mb-6">
                          <label htmlFor="email" className="block text-sm font-semibold mb-2 text-gold-300">メールアドレス</label>
                          <input type="email" name="email" required
                            className="w-full px-4 py-3 bg-navy-800 border border-gray-700 rounded-lg text-white" />
                        </div>

                        <div className="mb-6">
                          <label htmlFor="message" className="block text-sm font-semibold mb-2 text-gold-300">お問い合わせ内容</label>
                          <textarea name="message" rows="6" required
                            className="w-full px-4 py-3 bg-navy-800 border border-gray-700 rounded-lg text-white"></textarea>
                        </div>

                        <button 
                          type="submit"
                          disabled={status === 'submitting'}
                          className={`w-full py-4 bg-gradient-to-r from-gold-400 to-gold-300 text-navy-900 font-bold rounded-lg ${status === 'submitting' ? 'opacity-50 cursor-not-allowed' : 'hover:opacity-90 transition-opacity'}`}
                        >
                          {status === 'submitting' ? '送信中...' : '送信する'}
                        </button>

                      </form>

                    </div>
                  </div>
                </section>
            );
        }

        
        // ============ FOOTER ============
        function Footer() {
            return (
                <footer className="bg-navy-900 border-t border-gray-800 py-8">
                    <div className="container mx-auto px-6 text-center">
                        <p className="text-gray-400 text-sm">
                            © 2025 kozy_デザイン構築. All rights reserved.
                        </p>
                    </div>
                </footer>
            );
        }
        
        // ============ HOME PAGE ============
        function HomePage() {
            return (
                <>
                    <HeroSection />
                    <AboutSection />
                    <ShowcaseSection />
                    <ContactSection />
                    <Footer />
                </>
            );
        }
        
        // ============ WORK DETAIL PAGE ============
         function WorkDetailPage({ workId }) {
            const workData = {
                banner: {
                    title: 'バナーデザイン',
                    category: 'Graphic Design',
                    description: 'SNS広告・Web広告向けバナーを制作。視覚的インパクトとCTA誘導を両立したデザイン設計。',
                    tools: [],
                    images: [
                        '広告バナー.png',
                        '1bana.png',
                        '2bana.png',
                    ],
                    nextWork: 'lp',
                },
                lp: {
                    title: 'LP制作',
                    category: 'Web Design',
                    description: 'コンバージョン最大化を目的としたWebページ。情報設計から一貫対応。',
                    tools: [],
                    images: [
                        'ライディング.png',
                        // ▼ ここを修正：リンク先(link)を持たせたオブジェクト形式に変更 ▼
                        { src: 'KOHAKU_image_2.png', link: 'KOHAKU.html' },
                        { src: 'images/Ristorante Azzurro.png', link: 'Ristorante.html' },
                    ],
                    nextWork: 'insta',
                },
                insta: {
                    title: 'インスタ投稿',
                    category: 'SNS',
                    description: 'Instagram向けの投稿デザイン。視覚的な統一感を持った設計。',
                    tools: [],
                    images: [
                        'インスタ投稿.png',
                        '1Insta.png',
                        '2Insta.png',
                    ],
                    nextWork: 'thumbnail',
                },
                thumbnail: {
                    title: 'サムネイル',
                    category: 'Design',
                    description: 'YouTubeやSNS動画のクリック率を高めるサムネイル制作。ターゲット層に合わせた視認性の高いデザイン。',
                    tools: [],
                    images: [
                        'サムネイル.png',
                        '1SumSNS.png',
                        '2SumSNS.png',
                    ],
                    nextWork: 'ebook',
                },
                ebook: {
                    title: '電子書籍',
                    category: 'Design',
                    description: 'Kindle等の電子書籍の表紙デザイン。読者の目を惹き、内容を魅力的に伝える装丁を制作。',
                    tools: [],
                    images: [
                        '電子書籍.png',
                        '1Ebook.png',
                        '2Ebook.png',
                    ],
                    nextWork: 'slide',
                },
                slide: {
                    title: 'スライド作成',
                    category: 'Presentation',
                    description: 'ウェビナーや商談で成約率を高めるためのスライドデザイン。情報を視覚的に整理し、伝わる資料を作成。',
                    tools: [],
                    images: [
                        'スライド作成.png',
                        { 
                            src: 'https://picsum.photos/800/500?random=29', // ここはポートフォリオ上に表示するサムネイル画像
                            link: 'https://kozywebsite.my.canva.site/design-master4', // ここにCanvaなどのスライドURLを貼る
                            blank: true // 新しいタブで開く設定
                        },
                        { 
                            src: 'https://picsum.photos/800/500?random=30', // ここはポートフォリオ上に表示するサムネイル画像
                            link: 'https://kozywebsite.my.canva.site/chaina-business', // ここにCanvaなどのスライドURLを貼る
                            blank: true // 新しいタブで開く設定
                        },
                    ],
                    nextWork: 'banner',
                },
            };
            
            const work = workData[workId] || workData.banner;
            const sectionRef = useRef(null);
            const isVisible = useInView(sectionRef);
            
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [workId]);
            
            return (
                <div className="min-h-screen pt-20">
                    {/* Back Button */}
                    <div className="container mx-auto px-6 py-8">
                        <a href="#/" className="inline-flex items-center text-gold-300 hover:text-gold-400 transition-colors">
                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            BACK
                        </a>
                    </div>
                    
                    {/* Content */}
                    <div ref={sectionRef} className="container mx-auto px-6 pb-20 mt-8">
                        <div className="max-w-4xl mx-auto">
                            {/* Category & Title */}
                            <div className={`mb-8 fade-reveal ${isVisible ? 'visible' : ''}`}>
                                <span className="inline-block bg-gold-300 text-navy-900 px-4 py-1 rounded-full text-sm font-semibold mb-4">
                                    {work.category}
                                </span>
                                <h1 className="text-4xl md:text-5xl font-display text-gold-300 mb-6">
                                    {work.title}
                                </h1>
                                <p className="text-gray-300 text-lg leading-relaxed">
                                    {work.description}
                                </p>
                            </div>
                        
                            {/* Tools */}
                            <div className={`mb-12 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.1s' }}>
                                <h3 className="text-gold-300 font-semibold mb-4 flex items-center">
                                    <span className="w-12 h-px bg-gold-300 mr-3"></span>
                                   
                                </h3>
                                <div className="flex flex-wrap gap-3">
                                    {work.tools.map((tool, i) => (
                                        <span key={i} className="px-4 py-2 border border-gold-300/30 rounded-full text-sm">
                                            {tool}
                                        </span>
                                    ))}
                                </div>
                            </div>
                           
                            {/* Gallery */}
                            <div className="mb-16">
                                <h3 className={`text-2xl font-display text-gold-300 mb-8 fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.2s' }}>
                                    Gallery
                                </h3>
                                <div className="grid md:grid-cols-2 gap-6">
 
                                    {/* ▼ ここから表示ロジックを修正 ▼ */}
                                    {work.images.slice(1).map((item, i) => {
                                        const imgSrc = typeof item === 'string' ? item : item.src;
                                        const linkUrl = typeof item === 'object' ? item.link : null;
                                        // blank: true が設定されていれば "_blank"、なければ "_self"（同じタブ）にする
                                        const targetType = (typeof item === 'object' && item.blank) ? '_blank' : '_self';

                                        return (
                                            <div 
                                                key={i} 
                                                className={`fade-reveal ${isVisible ? 'visible' : ''} 
                                                bg-navy-800/40 backdrop-blur-sm border border-gold-300/10 
                                                rounded-xl p-5 transition-all duration-300 hover:border-gold-300/30 hover:shadow-lg hover:shadow-gold-300/10`} 
                                                style={{ transitionDelay: `${0.3 + i * 0.1}s` }}
                                            >
                                                {/* 画像部分 */}
<div className="aspect-[4/3] rounded-lg overflow-hidden relative bg-gray-100"> 
    {linkUrl ? (
        <a href={linkUrl} target={targetType} rel={targetType === '_blank' ? 'noopener noreferrer' : ''} className="block w-full h-full group">
            <img 
                src={imgSrc} 
                alt={`${work.title} ${i + 2}`}
                /* object-cover を object-contain に変更 */
                className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500"
            />
            {/* ホバー時のUI */}
            <div className="absolute inset-0 bg-navy-900/60 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <svg className="w-8 h-8 text-gold-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                <span className="text-gold-300 font-bold tracking-wider">スライドを見る</span>
            </div>
        </a>
                                                    ) : (
                                                        // リンクがない場合
                                                        <img 
                                                            src={imgSrc} 
                                                            alt={`${work.title} ${i + 2}`}
                                                           className="w-full h-full object-contain hover:scale-105 transition-transform duration-500"
                                                        />
                                                    )}
                                                </div>

                                                {/* 説明欄 */}
                                                <div className="mt-4">
                                                    <h4 className="text-lg font-display text-gold-300 tracking-wide">
                                                        {linkUrl ? "Presentation Slide" : (i === 0 ? "Corporate Branding" : "Motion & Interface Design")}
                                                    </h4>
                                                    <p className="text-sm text-gray-300 mt-2 leading-relaxed">
                                                        {linkUrl 
                                                            ? (targetType === '_blank' ? "画像をクリックすると、新しいタブでスライド資料が開きます。" : "サンプルの制作サイトをご覧いただけます。画像をクリックして遷移します。") 
                                                            : "設計思想と視認性を重視した構築を行います。"}
                                                    </p>
                                                    {!linkUrl && (
                                                        <p className="text-sm text-gray-400 mt-1 leading-relaxed">
                                                            表示はサンプルですが、ご要望に合わせてご対応いたします。
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {/* ▲ ここまで表示ロジックをアップデート ▲ */}                                    {/* ▲ ここまで表示ロジックを修正 ▲ */}

                                </div>
                            </div>
                            
                            {/* Next Work */}
                            <div className={`text-center fade-reveal ${isVisible ? 'visible' : ''}`} style={{ transitionDelay: '0.5s' }}>
                                <a 
                                    href={`#/work/${work.nextWork}`}
                                    className="inline-flex items-center text-gold-300 hover:text-gold-400 transition-colors text-lg group"
                                >
                                    <span className="mr-2">次の作品</span>
                                    <svg className="w-5 h-5 transform group-hover:translate-x-2 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" />
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <Footer />
                </div>
            );
        }
        // ============ MAIN APP ============
        function App() {
            const [currentRoute, setCurrentRoute] = useState(window.location.hash || '#/');
            
            useEffect(() => {
                const handleHashChange = () => {
                    setCurrentRoute(window.location.hash || '#/');
                };
                
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);
            
            // Route parsing
            let page = 'home';
            let workId = null;
            
            if (currentRoute.startsWith('#/work/')) {
                page = 'work';
                workId = currentRoute.split('/')[2];
            }
            
            return (
                <>
                    <LoadingScreen />
                    <ScrollProgress />
                    <Navigation currentPage={page} />
                    
                    {page === 'home' && <HomePage />}
                    {page === 'work' && <WorkDetailPage workId={workId} />}
                </>
            );
        }
        
        // ============ RENDER ============
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
